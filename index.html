<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Renders</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 48px 24px;
    }

    header {
      max-width: 720px;
      margin: 0 auto 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    header p {
      margin-top: 8px;
      color: #888;
      font-size: 0.95rem;
    }

    .grid {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 18px 22px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .card:hover {
      background: #222;
      border-color: #444;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
    }

    .card-sub {
      font-size: 0.8rem;
      color: #666;
      margin-top: 3px;
    }

    .arrow {
      color: #555;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .empty {
      max-width: 720px;
      margin: 0 auto;
      color: #555;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>HTML Renders</h1>
    <p>A collection of standalone HTML pages.</p>
  </header>

  <div class="grid" id="page-list">
    <!-- pages injected here, or show empty state -->
    <p class="empty">No pages yet. Add HTML files in subdirectories and update the list below.</p>
  </div>

  <!--
    HOW TO ADD A PAGE
    ─────────────────
    1. Put your HTML file in a subfolder, e.g. pages/my-page/index.html
    2. Add a <a> card entry in the script below.

    Example:
      { href: "pages/my-page/index.html", title: "My Page", sub: "Short description" }
  -->
  <script>
    const pages = [
      { href: "boond-india/Boond_homepage_layout.html", title: "Boond — Natural Perfume Oils from Kannauj", sub: "Homepage layout for Boond, a natural perfume oils brand" },
    ];

    const list = document.getElementById("page-list");

    if (pages.length > 0) {
      list.innerHTML = pages.map(p => `
        <a class="card" href="${p.href}">
          <div>
            <div class="card-title">${p.title}</div>
            ${p.sub ? `<div class="card-sub">${p.sub}</div>` : ""}
          </div>
          <span class="arrow">›</span>
        </a>
      `).join("");
    }
  </script>
</body>
</html>
